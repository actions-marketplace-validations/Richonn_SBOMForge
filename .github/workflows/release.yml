name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -trimpath -o sbomforge-linux-amd64   ./cmd/sbomforge
          GOOS=linux   GOARCH=arm64 go build -trimpath -o sbomforge-linux-arm64   ./cmd/sbomforge
          GOOS=darwin  GOARCH=amd64 go build -trimpath -o sbomforge-darwin-amd64  ./cmd/sbomforge
          GOOS=darwin  GOARCH=arm64 go build -trimpath -o sbomforge-darwin-arm64  ./cmd/sbomforge
          GOOS=windows GOARCH=amd64 go build -trimpath -o sbomforge-windows-amd64.exe ./cmd/sbomforge
      - name: Compute SHA256 hashes
        id: hash
        run: |
          sha256sum sbomforge-* > checksums.txt
          echo "hashes=$(sha256sum sbomforge-* | base64 -w0)" >> $GITHUB_OUTPUT
      - name: Upload artifacts to GitHub Release
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" sbomforge-* checksums.txt --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              sbomforge-* checksums.txt
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # SHA pinning not supported by SLSA generator (requires tag ref)
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
